<header class="resume-header">
  <h1 class="resume-name">{{ site.data.profile.name }}</h1>
  <h2 class="resume-title">{{ site.data.profile.title }}</h2>

  <div class="resume-contact">
    <span>{{ site.data.profile.location }}</span>
    <span>{{ site.data.profile.phone }}</span>
    <span><a href="mailto:{{ site.data.profile.email }}">{{ site.data.profile.email }}</a></span>
    <span><a href="{{ site.data.profile.linkedin}}" target="_blank">{{ site.data.profile.linkedin }}</a></span>
    <span><a href="{{ site.data.profile.website }}" target="_blank">{{ site.data.profile.website }}</a></span>
  </div>
</header>
